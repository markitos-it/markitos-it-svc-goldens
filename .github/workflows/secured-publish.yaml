name: secured-publish-image-to-gcp

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.PROJECT_ID || 'markitos-it-labs-course-basic' }}
  REGION: ${{ vars.REGION || 'europe-southwest1' }}
  REPOSITORY: ${{ vars.REPOSITORY || 'private' }}
  IMAGE_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read

jobs:
  scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    concurrency:
      group: appsec-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source="/repo" --redact --no-banner --verbose

  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    concurrency:
      group: sast-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  dependencies:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    concurrency:
      group: deps-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "MEDIUM,HIGH,CRITICAL"
          format: "table"
          exit-code: "0"

  infrastructure:
    name: Infrastructure as Code Scanning
    runs-on: ubuntu-latest
    concurrency:
      group: iac-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          compact: true
          framework: all
          output_format: cli

  linting:
    name: Bash Linting
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: ShellCheck Scan
        shell: bash
        run: |
          sudo apt-get install -y shellcheck
          find . -type f -name "*.sh" -not -path "*/alias/*" -print0 | xargs -0 shellcheck --severity=style --shell=bash --exclude=SC1090 || true

  publish:
    name: Publish Image to GCP
    runs-on: ubuntu-latest
    needs: [scan, sast, dependencies, infrastructure, linting]
    if: ${{ success() }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show environment values
        run: |
          echo "PROJECT_ID: ${{ env.PROJECT_ID }}"
          echo "REGION: ${{ env.REGION }}"
          echo "REPOSITORY: ${{ env.REPOSITORY }}"
          echo "IMAGE_NAME: ${{ env.IMAGE_NAME }}"
          echo "Tag: ${{ github.ref_name }}"
          echo "Full image path: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as credential helper
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
