apiVersion: v1
kind: Namespace
metadata:
  name: goldens
---
apiVersion: apps/v1
kind: Deployment
# checkov:skip=CKV_K8S_35:Using env var for DB_PASS temporarily until file-based secret refactor
metadata:
  name: markitos-it-svc-goldens-deployment
  namespace: goldens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: markitos-it-svc-goldens-pods
  template:
    metadata:
      labels:
        app: markitos-it-svc-goldens-pods
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: gcp-artifact-registry-secret
      containers:
      - name: markitos-it-svc-goldens-container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        imagePullPolicy: Always
        image: europe-southwest1-docker.pkg.dev/markitos-it-labs-course-basic/private/markitos-it-svc-goldens@sha256:4b2793a72697056aaaa11fa6731d7b7f8c974665fa1e67c854709484d8fc8d85
        ports:
        - containerPort: 3000
          name: grpc
        env:
        - name: GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: goldens-config
              key: GRPC_PORT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: goldens-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: goldens-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: goldens-config
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: goldens-config
              key: DB_NAME
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: markitos-it-svc-goldens-service
  namespace: goldens
spec:
  type: ClusterIP
  selector:
    app: markitos-it-svc-goldens-pods
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: markitos-it-svc-goldens-hpa
  namespace: goldens
spec:
  minReplicas: 1
  maxReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: markitos-it-svc-goldens-deployment
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: goldens-config
  namespace: goldens
data:
  GRPC_PORT: "3000"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "markitos-it-svc-goldens"
  DB_PASS: "markitos-it-svc-goldens" # gitleaks:allow (local dev password)
  DB_NAME: "markitos-it-svc-goldens"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-markitos-goldens
  namespace: goldens
spec:
  podSelector:
    matchLabels:
      app: markitos-it-svc-goldens-pods
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
